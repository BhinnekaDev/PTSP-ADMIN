name: Deploy PTSP Admin FE

on:
  push:
    branches: [development]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Node.js
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------
      # Build aplikasi (testing)
      # -----------------------------
      - name: Build aplikasi
        run: npm run build

      # -----------------------------
      # Login ke Docker Hub
      # -----------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------
      # Build Docker image
      # -----------------------------
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/ptsp-admin-fe:dev .

      # -----------------------------
      # Push Docker image
      # -----------------------------
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ptsp-admin-fe:dev

      # -----------------------------
      # Setup SSH ke server
      # -----------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519

          # ✅ FIX: pake SERVER_PORT
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts || true

      # -----------------------------
      # Deploy ke server
      # -----------------------------
      - name: Deploy to Server
        run: |
          # ✅ FIX: pake SERVER_PORT
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ${{ secrets.PROJECT_PATH }}

            echo "Stopping old containers..."
            docker compose down || true

            echo "Removing old image..."
            docker rmi -f ${{ secrets.DOCKER_USERNAME }}/ptsp-admin-fe:dev || true

            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/ptsp-admin-fe:dev

            echo "Starting new containers..."
            docker compose up -d --force-recreate

            echo "Deploy finished! Containers are running:"
            docker ps
          EOF
